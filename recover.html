<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Recover Certificate — LedgerLearn Pro</title>
<link rel="icon" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:system-ui,sans-serif;background:#0B1F3A;min-height:100vh;display:flex;flex-direction:column;}
nav{height:56px;background:rgba(11,31,58,0.98);border-bottom:2px solid #D4A843;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.hex{width:22px;height:22px;background:#D4A843;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.brand{font-weight:800;font-size:1rem;color:#fff;}.brand b{color:#D4A843;}
.nav-back{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;}
.nav-back:hover{color:#fff;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:radial-gradient(ellipse at 30% 50%,rgba(29,169,138,0.08) 0%,transparent 60%),
             radial-gradient(ellipse at 70% 30%,rgba(212,168,67,0.06) 0%,transparent 50%);}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:2.5rem 2rem;max-width:460px;width:100%;}
h1{font-size:1.5rem;font-weight:800;color:#fff;margin-bottom:0.4rem;letter-spacing:-0.02em;}
h1 span{color:#D4A843;}
.sub{font-size:0.85rem;color:rgba(255,255,255,0.5);line-height:1.7;margin-bottom:1.75rem;font-weight:300;}
.field{margin-bottom:0.75rem;}
label{font-size:0.68rem;color:rgba(255,255,255,0.4);display:block;margin-bottom:4px;text-transform:uppercase;letter-spacing:0.07em;}
input{width:100%;padding:12px 14px;background:rgba(255,255,255,0.07);border:1px solid rgba(255,255,255,0.12);border-radius:8px;color:#fff;font-size:0.9rem;font-family:inherit;outline:none;transition:border-color 0.2s;}
input:focus{border-color:#D4A843;background:rgba(255,255,255,0.1);}
input::placeholder{color:rgba(255,255,255,0.2);}
.err-msg{font-size:0.75rem;color:#ff8080;min-height:1em;margin-top:4px;}
.btn{width:100%;padding:15px;border-radius:10px;font-family:inherit;font-size:1rem;font-weight:700;cursor:pointer;border:none;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:10px;margin-bottom:0.6rem;}
.btn-gold{background:#D4A843;color:#0B1F3A;}
.btn-gold:hover{background:#f0c860;transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,67,0.35);}
.btn-gold:active{transform:translateY(0);}
.btn-teal{background:#1DA98A;color:#fff;}
.btn-teal:hover{background:#26c9a5;transform:translateY(-2px);}
.btn-ghost{background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.1);color:rgba(255,255,255,0.6);}
.btn-ghost:hover{background:rgba(255,255,255,0.1);color:#fff;}
.btn:disabled{opacity:0.5;cursor:not-allowed;transform:none !important;}
.status{font-size:0.82rem;padding:12px 15px;border-radius:8px;margin-bottom:1rem;display:none;line-height:1.5;}
.status.ok{display:block;background:rgba(29,169,138,0.12);border:1px solid rgba(29,169,138,0.3);color:#26c9a5;}
.status.err{display:block;background:rgba(224,85,85,0.1);border:1px solid rgba(224,85,85,0.25);color:#ff8080;}
.status.info{display:block;background:rgba(212,168,67,0.1);border:1px solid rgba(212,168,67,0.25);color:#D4A843;}
canvas{display:none;}
</style>
</head>
<body>

<nav>
  <a href="/" class="logo"><div class="hex"></div><span class="brand">Ledger<b>Learn</b> Pro</span></a>
  <a href="/dashboard" class="nav-back">Dashboard</a>
</nav>

<main>
  <div class="card">
    <h1>Download your <span>certificate</span></h1>
    <p class="sub">Enter your assessment details below. Your certificate downloads immediately — no need to go anywhere else.</p>

    <div id="status" class="status"></div>

    <div class="field">
      <label>Full name (as on certificate)</label>
      <input type="text" id="f-name" placeholder="e.g. David Ayomidotun" autocomplete="name"/>
      <div class="err-msg" id="err-name"></div>
    </div>
    <div class="field">
      <label>Score achieved (%)</label>
      <input type="number" id="f-score" placeholder="e.g. 90" min="70" max="100"/>
      <div class="err-msg" id="err-score"></div>
    </div>
    <div class="field">
      <label>Certificate ID (optional — leave blank to generate)</label>
      <input type="text" id="f-certid" placeholder="e.g. LLP-XCP1-2026-4231"/>
    </div>
    <div class="field">
      <label>Issue date (optional)</label>
      <input type="text" id="f-date" placeholder="e.g. 5 May 2026"/>
    </div>

    <button class="btn btn-gold" id="btn-download" onclick="downloadNow()">
      Download Certificate (PNG)
    </button>
    <button class="btn btn-teal" id="btn-print" onclick="printNow()">
      Open Printable Version (PDF)
    </button>
    <button class="btn btn-ghost" onclick="shareLinkedIn(buildCert())">
      Share on LinkedIn
    </button>

    <canvas id="cv"></canvas>
  </div>
</main>

<script>
// ── Canvas helpers ────────────────────────────────────────
function hex(ctx,cx,cy,r){ctx.beginPath();for(var i=0;i<6;i++){var a=Math.PI/180*(90+60*i);if(i===0)ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}ctx.closePath();ctx.fill();}
function rr(ctx,x,y,w,h,r){ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();}

// ── Draw certificate on canvas ────────────────────────────
function drawCert(cert) {
  var W=1748,H=1240,cx=W/2;
  var canvas=document.getElementById('cv');
  canvas.width=W; canvas.height=H;
  var c=canvas.getContext('2d');

  c.fillStyle='#f8f7f4'; c.fillRect(0,0,W,H);
  c.fillStyle='#fff'; c.fillRect(24,24,W-48,H-48);

  var tg=c.createLinearGradient(0,0,W,0);
  tg.addColorStop(0,'#0B1F3A');tg.addColorStop(0.45,'#D4A843');tg.addColorStop(1,'#1DA98A');
  c.fillStyle=tg; c.fillRect(0,0,W,22);

  var bg=c.createLinearGradient(0,0,W,0);
  bg.addColorStop(0,'#1DA98A');bg.addColorStop(0.6,'#D4A843');bg.addColorStop(1,'#0B1F3A');
  c.fillStyle=bg; c.fillRect(0,H-14,W,14);

  c.fillStyle='#D4A843'; c.fillRect(24,24,4,H-48);
  c.fillStyle='#1DA98A'; c.fillRect(32,24,2,H-48);

  c.save();c.globalAlpha=0.025;c.fillStyle='#0B1F3A';hex(c,W*0.82,H*0.48,280);c.restore();

  c.fillStyle='#D4A843'; hex(c,72,H-58,20);
  c.textAlign='left'; c.font='bold 28px system-ui,sans-serif'; c.fillStyle='#0B1F3A';
  var llw=c.measureText('LedgerLearn').width;
  c.fillText('LedgerLearn',102,H-44);
  c.fillStyle='#D4A843'; c.fillText(' Pro',102+llw,H-44);

  var idt='Certificate ID: '+cert.certId;
  c.font='20px system-ui,sans-serif';
  var iw=c.measureText(idt).width+30;
  c.fillStyle='#e8ecf0'; rr(c,W-iw-50,H-80,iw,36,6); c.fill();
  c.fillStyle='#6b87a3'; c.fillText(idt,W-iw-35,H-57);

  c.textAlign='center';
  c.font='bold 22px system-ui,sans-serif'; c.fillStyle='#6b87a3';
  c.fillText('THIS CERTIFIES THAT',cx,220);

  c.font='bold italic 90px Georgia,serif'; c.fillStyle='#0B1F3A';
  c.fillText(cert.candidateName,cx,340);

  var nw=c.measureText(cert.candidateName).width*0.55;
  var lg=c.createLinearGradient(cx-nw/2,0,cx+nw/2,0);
  lg.addColorStop(0,'#D4A843');lg.addColorStop(1,'#1DA98A');
  c.strokeStyle=lg; c.lineWidth=5;
  c.beginPath();c.moveTo(cx-nw/2,358);c.lineTo(cx+nw/2,358);c.stroke();

  c.font='26px system-ui,sans-serif'; c.fillStyle='#6b87a3';
  c.fillText('has successfully completed all requirements for',cx,410);

  c.font='bold 48px system-ui,sans-serif'; c.fillStyle='#0B1F3A';
  c.fillText(cert.certTitle,cx,490);

  var sc='Score: '+cert.score+'%';
  c.font='bold 22px system-ui,sans-serif';
  var sw=c.measureText(sc).width+30;
  c.fillStyle='#e1f7f2'; rr(c,cx-sw/2,508,sw,38,19); c.fill();
  c.strokeStyle='rgba(29,169,138,0.4)'; c.lineWidth=1; rr(c,cx-sw/2,508,sw,38,19); c.stroke();
  c.fillStyle='#1DA98A'; c.fillText(sc,cx,533);

  c.font='bold 20px system-ui,sans-serif';
  var lv=c.measureText(cert.certLevel).width+40;
  c.fillStyle='#e1f7f2'; rr(c,cx-lv/2,560,lv,36,18); c.fill();
  c.strokeStyle='rgba(29,169,138,0.3)'; c.lineWidth=1; rr(c,cx-lv/2,560,lv,36,18); c.stroke();
  c.fillStyle='#1DA98A'; c.fillText(cert.certLevel,cx,584);

  c.strokeStyle='#e8ecf0'; c.lineWidth=2;
  c.beginPath();c.moveTo(60,680);c.lineTo(W-60,680);c.stroke();

  c.font='bold italic 28px Georgia,serif'; c.fillStyle='#0B1F3A';
  c.fillText('David Ayomidotun',200,730);
  c.font='18px system-ui,sans-serif'; c.fillStyle='#6b87a3';
  c.fillText('Platform Director',200,756);
  c.fillText('LedgerLearn Pro',200,778);
  c.strokeStyle='#e8ecf0'; c.lineWidth=1.5;
  c.beginPath();c.moveTo(80,680);c.lineTo(340,680);c.stroke();

  c.font='bold 26px system-ui,sans-serif'; c.fillStyle='#0B1F3A';
  c.fillText(cert.issueDate,W-200,730);
  c.font='18px system-ui,sans-serif'; c.fillStyle='#6b87a3';
  c.fillText('Date of Issue',W-200,756);
  c.strokeStyle='#e8ecf0'; c.lineWidth=1.5;
  c.beginPath();c.moveTo(W-340,680);c.lineTo(W-80,680);c.stroke();

  var sx=cx,sy=718,sr=56;
  c.strokeStyle='#D4A843'; c.lineWidth=3;
  c.beginPath();c.arc(sx,sy,sr,0,Math.PI*2);c.stroke();
  c.setLineDash([4,6]); c.lineWidth=1.5;
  c.beginPath();c.arc(sx,sy,sr-10,0,Math.PI*2);c.stroke();
  c.setLineDash([]);
  c.fillStyle='#fff'; c.beginPath();c.arc(sx,sy,sr-12,0,Math.PI*2);c.fill();
  c.font='bold 14px system-ui,sans-serif'; c.fillStyle='#a07c2a';
  c.fillText('LEDGERLEARN',sx,sy+4);
  c.fillText('VERIFIED',sx,sy+22);
  c.fillStyle='#D4A843'; hex(c,sx,sy-14,9);

  c.font='18px system-ui,sans-serif'; c.fillStyle='#6b87a3';
  c.fillText('Verify: '+window.location.hostname+'/verify  \u00B7  ID: '+cert.certId,cx,H-32);

  return canvas;
}

// ── Validate form and build cert object ───────────────────
function buildCert() {
  var name  = document.getElementById('f-name').value.trim();
  var score = parseInt(document.getElementById('f-score').value, 10);
  var certid= document.getElementById('f-certid').value.trim();
  var date  = document.getElementById('f-date').value.trim();

  // Clear errors
  document.getElementById('err-name').textContent  = '';
  document.getElementById('err-score').textContent = '';

  var ok = true;
  if (!name || name.indexOf(' ') < 1) {
    document.getElementById('err-name').textContent = 'Please enter your first and last name.';
    ok = false;
  }
  if (!score || score < 70 || score > 100) {
    document.getElementById('err-score').textContent = 'Please enter your score (70–100).';
    ok = false;
  }
  if (!ok) return null;

  return {
    candidateName: name,
    certTitle:     'Xero Certified Practitioner \u2014 Level 1',
    certLevel:     'L1 \u00B7 Associate \u00B7 Xero Cloud Accounting \u00B7 LedgerLearn Pro',
    certId:        certid || ('LLP-XCP1-' + new Date().getFullYear() + '-' + Math.floor(1000+Math.random()*9000)),
    issueDate:     date  || new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
    score:         score
  };
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status ' + type;
}

function saveToStorage(cert) {
  try {
    localStorage.setItem('ll_progress', JSON.stringify({
      lastScore: cert.score, certificate: cert, certId: cert.certId, completedLevels: ['l1']
    }));
    localStorage.setItem('ll_completed', JSON.stringify([0,1,2,3,4,5]));
    localStorage.setItem('ll_user', JSON.stringify({name: cert.candidateName, ts: Date.now()}));
    window._certData = cert;
  } catch(e) {}
}

// ── Download as PNG ───────────────────────────────────────
function downloadNow() {
  var cert = buildCert();
  if (!cert) return;

  setStatus('Drawing your certificate\u2026', 'info');
  document.getElementById('btn-download').disabled = true;

  setTimeout(function() {
    try {
      saveToStorage(cert);
      var canvas = drawCert(cert);
      var fname  = 'LedgerLearn_Certificate_' + cert.candidateName.replace(/\s+/g,'_') + '_' + cert.certId + '.png';

      canvas.toBlob(function(blob) {
        document.getElementById('btn-download').disabled = false;
        if (!blob) { printNow(); return; }

        var url = URL.createObjectURL(blob);
        var a   = document.createElement('a');
        a.href  = url; a.download = fname; a.style.display = 'none';
        document.body.appendChild(a);
        a.click();
        setTimeout(function(){ URL.revokeObjectURL(url); a.remove(); }, 1000);
        setStatus('Certificate downloaded successfully! Check your downloads folder.', 'ok');
      }, 'image/png');

    } catch(e) {
      document.getElementById('btn-download').disabled = false;
      console.error('[recover] draw error:', e);
      setStatus('PNG failed \u2014 opening printable version instead.', 'err');
      printNow();
    }
  }, 150);
}

// ── Open printable HTML version ───────────────────────────
function printNow() {
  var cert = buildCert();
  if (!cert) return;
  saveToStorage(cert);

  var dom = window.location.hostname;
  var h = '<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Certificate</title>' +
    '<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Georgia,serif;background:#eee;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;}' +
    '.c{background:#fff;width:100%;max-width:900px;aspect-ratio:1.414/1;box-shadow:0 10px 40px rgba(0,0,0,.2);display:flex;flex-direction:column;}' +
    '.t{height:8px;background:linear-gradient(90deg,#0B1F3A,#D4A843 45%,#1DA98A);}.bb{height:4px;background:linear-gradient(90deg,#1DA98A,#D4A843 60%,#0B1F3A);}' +
    '.b{flex:1;padding:2rem 3rem;display:flex;flex-direction:column;align-items:center;text-align:center;}' +
    '.lo{font-family:Arial,sans-serif;font-weight:700;color:#0B1F3A;margin-bottom:1rem;font-size:1rem;}.lo b{color:#D4A843;}' +
    'h3{font-family:Arial,sans-serif;font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;color:#6b87a3;margin-bottom:.3rem;}' +
    'h1{font-style:italic;font-size:clamp(1.8rem,5vw,3rem);color:#0B1F3A;margin-bottom:.3rem;}' +
    '.ln{width:50px;height:2px;background:linear-gradient(90deg,#D4A843,#1DA98A);margin:.3rem auto;}' +
    'h2{font-family:Arial,sans-serif;font-weight:700;font-size:clamp(.9rem,2vw,1.2rem);color:#0B1F3A;margin:.3rem 0;}' +
    '.pl{background:#e1f7f2;color:#1DA98A;font-family:Arial,sans-serif;font-size:.62rem;font-weight:700;text-transform:uppercase;padding:2px 10px;border-radius:100px;display:inline-block;}' +
    '.sc{background:#fdf3dc;color:#9a7320;font-family:Arial,sans-serif;font-size:.65rem;font-weight:700;padding:2px 10px;border-radius:100px;display:inline-block;margin:.4rem 0;}' +
    '.ft{display:flex;justify-content:space-between;align-items:flex-end;width:100%;margin-top:auto;padding-top:.75rem;border-top:1px solid #e8ecf0;}' +
    '.sg{text-align:center;font-family:Arial,sans-serif;}.sn{font-style:italic;font-family:Georgia,serif;font-size:.9rem;color:#0B1F3A;}.sr{font-size:.52rem;text-transform:uppercase;color:#6b87a3;}' +
    '.sl{width:55px;height:55px;border-radius:50%;border:2px solid #D4A843;display:flex;align-items:center;justify-content:center;}' +
    '.sl span{font-family:Arial,sans-serif;font-size:.36rem;font-weight:700;text-transform:uppercase;text-align:center;color:#a07c2a;line-height:1.5;}' +
    '.ve{font-family:Arial,sans-serif;font-size:.52rem;color:#6b87a3;margin-top:.4rem;}' +
    '.ac{display:flex;gap:.75rem;}.btn{padding:11px 22px;border:none;border-radius:7px;font-size:.95rem;font-weight:700;cursor:pointer;}.d{background:#1DA98A;color:#fff;}.x{background:#f0f2f5;}' +
    '@media print{body{background:#fff;padding:0;}.ac{display:none!important;}.c{box-shadow:none;max-width:100%;}}</style></head><body>' +
    '<div class="c"><div class="t"></div><div class="b">' +
    '<div class="lo">Ledger<b>Learn</b> Pro</div>' +
    '<h3>This certifies that</h3><h1>' + cert.candidateName + '</h1><div class="ln"></div>' +
    '<p style="font-family:Arial,sans-serif;font-size:.78rem;color:#6b87a3;margin-bottom:.3rem">has successfully completed all requirements for</p>' +
    '<h2>' + cert.certTitle + '</h2>' +
    '<div class="pl">' + cert.certLevel + '</div>' +
    '<div class="sc">Score: ' + cert.score + '% \u2014 Passed \u2713</div>' +
    '<div class="ft">' +
    '<div class="sg"><div class="sn">David Ayomidotun</div><div class="sr">Platform Director \u00B7 LedgerLearn Pro</div></div>' +
    '<div class="sl"><span>LEDGER<br>LEARN<br>VERIFIED</span></div>' +
    '<div class="sg"><div class="sn" style="font-style:normal;font-size:.82rem">' + cert.issueDate + '</div><div class="sr">Date of Issue</div></div>' +
    '</div><div class="ve">Certificate ID: ' + cert.certId + ' \u00B7 Verify: ' + dom + '/verify</div>' +
    '</div><div class="bb"></div></div>' +
    '<div class="ac">' +
    '<button class="btn d" onclick="window.print()">Save as PDF (Print \u2192 Save as PDF)</button>' +
    '<button class="btn x" onclick="window.close()">Close</button>' +
    '</div></body></html>';

  var blob = new Blob([h], {type:'text/html'});
  var url  = URL.createObjectURL(blob);
  var win  = window.open(url, '_blank');
  if (!win) {
    var a = document.createElement('a');
    a.href = url; a.download = 'LedgerLearn_Certificate_' + cert.candidateName.replace(/\s+/g,'_') + '.html';
    document.body.appendChild(a); a.click(); a.remove();
  }
  setStatus('Printable certificate opened. Use Print \u2192 Save as PDF.', 'ok');
}

// ── LinkedIn share ────────────────────────────────────────
function shareLinkedIn(cert) {
  if (!cert) {
    try {
      var p = JSON.parse(localStorage.getItem('ll_progress') || '{}');
      cert = p.certificate || null;
      if (!cert && p.lastScore) {
        var u = JSON.parse(localStorage.getItem('ll_user') || '{}');
        cert = { candidateName: u.name || 'Candidate',
          certTitle: 'Xero Certified Practitioner \u2014 Level 1',
          certLevel: 'L1 \u00B7 Associate \u00B7 Xero Cloud Accounting \u00B7 LedgerLearn Pro',
          certId: p.certId || 'LLP-XCP1-2026-0001',
          issueDate: p.issueDate || new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
          score: p.lastScore };
      }
    } catch(e) {}
  }
  if (!cert) { alert('No certificate data found.'); return; }

  var dom  = window.location.hostname === 'localhost' ? 'ledgerlearn.pro' : window.location.hostname;
  var vurl = 'https://' + dom + '/verify';

  var lines = [
    'Excited to share that I have just earned my ' + cert.certTitle + '!',
    '',
    'After completing six structured modules covering Xero navigation, invoicing, bank reconciliation, chart of accounts, and financial reporting, I sat and passed the timed assessment with a score of ' + cert.score + '%.',
    '',
    'This certification was completed through LedgerLearn Pro - a platform purpose-built for bookkeepers and accountants who want to certify their Xero, QuickBooks, and Sage skills with verifiable, employer-ready credentials.',
    '',
    'If you are a bookkeeper looking to validate your cloud accounting skills and stand out to clients and employers, LedgerLearn Pro is worth checking out. L1 is completely free to start.',
    '',
    'Platform: ledgerlearn.pro',
    'Certificate ID: ' + cert.certId + ' - Verify at: ' + vurl,
    '',
    '#Xero #CloudAccounting #Bookkeeping #CertifiedPractitioner #LedgerLearn #ProfessionalDevelopment #Accounting #XeroCertified'
  ];
  var txt = lines.join('\n');

  var liUrl = 'https://www.linkedin.com/sharing/share-offsite/?url=' +
              encodeURIComponent(vurl) + '&summary=' + encodeURIComponent(txt);

  var popup = window.open(liUrl, 'li_share', 'width=600,height=680,scrollbars=yes');
  if (!popup || popup.closed) {
    var a = document.createElement('a');
    a.href = liUrl; a.target = '_blank'; a.rel = 'noopener noreferrer';
    document.body.appendChild(a); a.click(); a.remove();
  }

  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(txt).then(function() {
      if (typeof inlineToast === 'function') inlineToast('LinkedIn opened + post text copied to clipboard', 'success');
      else if (typeof setStatus === 'function') setStatus('LinkedIn opened + post text copied to clipboard.', 'ok');
    }).catch(function() {});
  }
}

// ── Pre-fill from existing localStorage ──────────────────
(function init() {
  try {
    var p = JSON.parse(localStorage.getItem('ll_progress') || '{}');
    var u = JSON.parse(localStorage.getItem('ll_user')     || '{}');
    var c = p.certificate || {};
    if (u.name)       document.getElementById('f-name').value  = u.name;
    if (p.lastScore)  document.getElementById('f-score').value = p.lastScore;
    if (c.certId)     document.getElementById('f-certid').value= c.certId;
    if (c.issueDate)  document.getElementById('f-date').value  = c.issueDate;
  } catch(e) {}
})();
</script>
