[[redirects]]
  from = "/faq"
  to   = "/faq.html"
  status = 200


[[headers]]
  for = "/certificate-engine*.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"
    Pragma = "no-cache"

[[redirects]]
  from = "/api/admin-config"
  to   = "/.netlify/functions/admin-config"
  status = 200

[[redirects]]
  from = "/api/admin-data"
  to   = "/.netlify/functions/admin-data"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404

# ── Security headers ──────────────────────────────────────

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"
