# LedgerLearn Pro — Netlify Configuration
# =========================================

[build]
  publish   = "."
  functions = "netlify/functions"

# ── Pretty URLs ───────────────────────────────────────────

[[redirects]]
  from = "/dashboard"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/learn"
  to   = "/learn.html"
  status = 200

[[redirects]]
  from = "/practice"
  to   = "/practice.html"
  status = 200

[[redirects]]
  from = "/test"
  to   = "/test.html"
  status = 200

[[redirects]]
  from = "/verify"
  to   = "/verify.html"
  status = 200

[[redirects]]
  from = "/quickbooks"
  to   = "/quickbooks.html"
  status = 200

[[redirects]]
  from = "/certificate-success"
  to   = "/certificate-success.html"
  status = 200

[[redirects]]
  from = "/jobs-sidebar-demo"
  to   = "/jobs-sidebar-demo.html"
  status = 200

[[redirects]]
  from = "/placement"
  to   = "/placement.html"
  status = 200

[[redirects]]
  from = "/sim-xero-invoice"
  to   = "/xero-invoice-sim.html"
  status = 200

[[redirects]]
  from = "/sim-xero-bankrec"
  to   = "/xero-bankrec-sim.html"
  status = 200

[[redirects]]
  from = "/sim-qb-invoice"
  to   = "/qb-invoice-sim.html"
  status = 200

[[redirects]]
  from = "/xero-invoice-sim"
  to   = "/xero-invoice-sim.html"
  status = 200

[[redirects]]
  from = "/xero-bankrec-sim"
  to   = "/xero-bankrec-sim.html"
  status = 200

[[redirects]]
  from = "/qb-invoice-sim"
  to   = "/qb-invoice-sim.html"
  status = 200


[[redirects]]
  from = "/learn-l2"
  to   = "/learn-l2.html"
  status = 200

[[redirects]]
  from = "/learn-l3"
  to   = "/learn-l3.html"
  status = 200

[[redirects]]
  from = "/xero-vat-sim"
  to   = "/xero-vat-sim.html"
  status = 200

[[redirects]]
  from = "/xero-mgmt-sim"
  to   = "/xero-mgmt-sim.html"
  status = 200

# ── 404 fallback ──────────────────────────────────────────

[[redirects]]
  from = "/recover"
  to   = "/recover.html"
  status = 200

[[redirects]]
  from = "/level-up"
  to   = "/level-up.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404

# ── Security headers ──────────────────────────────────────

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"
