# LedgerLearn Pro — Netlify Configuration

[build]
  publish   = "."
  functions = "netlify/functions"

[[redirects]]
  from = "/dashboard"
  to   = "/dashboard.html"
  status = 200

[[redirects]]
  from = "/learn"
  to   = "/learn.html"
  status = 200

[[redirects]]
  from = "/practice"
  to   = "/practice.html"
  status = 200

[[redirects]]
  from = "/test"
  to   = "/test.html"
  status = 200

[[redirects]]
  from = "/verify"
  to   = "/verify.html"
  status = 200

[[redirects]]
  from = "/quickbooks"
  to   = "/quickbooks.html"
  status = 200

[[redirects]]
  from = "/certificate-success"
  to   = "/certificate-success.html"
  status = 200

[[redirects]]
  from = "/jobs-sidebar-demo"
  to   = "/jobs-sidebar-demo.html"
  status = 200

[[redirects]]
  from = "/*"
  to   = "/index.html"
  status = 404

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "SAMEORIGIN"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"

[[headers]]
  for = "/*.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[headers]]
  for = "/*.js"
  [headers.values]
    Cache-Control = "public, max-age=86400"

[[redirects]]
  from = "/placement"
  to   = "/placement.html"
  status = 200

[[redirects]]
  from = "/sim-xero-invoice"
  to   = "/xero-invoice-sim.html"
  status = 200

[[redirects]]
  from = "/sim-xero-bankrec"
  to   = "/xero-bankrec-sim.html"
  status = 200

[[redirects]]
  from = "/sim-qb-invoice"
  to   = "/qb-invoice-sim.html"
  status = 200
