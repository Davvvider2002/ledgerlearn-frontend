<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice — LedgerLearn Pro</title>
<link rel="icon" href="/favicon.svg">
<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  LedgerLearn — Routing Module v6.0                          ║
// ║  Single source of truth. Identical copy in every page.      ║
// ╚══════════════════════════════════════════════════════════════╝
var LL = LL || {};

LL.progress = (function() {
  function getRaw() {
    try { return JSON.parse(localStorage.getItem('ll_progress') || '{}'); } catch(e) { return {}; }
  }
  function getUser() {
    try { return JSON.parse(localStorage.getItem('ll_user') || '{}'); } catch(e) { return {}; }
  }

  function state() {
    var p         = getRaw();
    var completed = p.completedLevels || [];

    // Admin valid only while sessionStorage token exists (clears on tab/browser close)
    var tok = sessionStorage.getItem('ll_admin_token');
    var exp = sessionStorage.getItem('ll_admin_expires');
    var isAdmin = !!(tok && exp && new Date(exp) > new Date());

    // PASSED = in completedLevels AND real score exists
    var passedL1 = completed.includes('l1') && (p.lastScore != null || p.l1Score != null);
    var passedL2 = completed.includes('l2') && (p.l2Score  != null);
    var passedL3 = completed.includes('l3') && (p.l3Score  != null);

    // PAID = confirmed PayPal payment
    var paidL2 = p.paid_l2 === true;

    // ACCESS
    var accessL1 = true;
    var accessL2 = (passedL1 && paidL2) || isAdmin;
    var accessL3 = passedL2 || isAdmin;

    // WORKING LEVEL — where the user currently is
    var workingLevel;
    if (!passedL1 && !isAdmin) {
      workingLevel = 'l1';
    } else if (!accessL2) {
      workingLevel = 'l1';   // L1 done, not yet unlocked L2
    } else if (!passedL2) {
      workingLevel = 'l2';   // L2 unlocked, working through it
    } else if (!passedL3) {
      workingLevel = 'l3';   // L2 done, working on L3
    } else {
      workingLevel = 'l3';   // All done
    }
    if (isAdmin) workingLevel = 'l3';

    return {
      p, completed, isAdmin,
      passedL1, passedL2, passedL3,
      paidL2,
      accessL1, accessL2, accessL3,
      workingLevel,
    };
  }

  function learnPage(s) {
    return s.workingLevel === 'l3' ? '/learn-l3' :
           s.workingLevel === 'l2' ? '/learn-l2' : '/learn';
  }

  return { getRaw, getUser, state, learnPage };
})();

// Page routing — call once at page load
LL.route = function(page) {
  try {
    var s = LL.progress.state();

    if (page === 'practice') {
      window.location.replace(LL.progress.learnPage(s));
      return;
    }
    if (page === 'learn') {
      // Never auto-redirect from /learn — user chose to be here
      return;
    }
    if (page === 'learn-l2') {
      if (!s.accessL2) { window.location.replace('/learn'); return; }
      return;
    }
    if (page === 'learn-l3') {
      if (!s.accessL3) {
        window.location.replace(s.accessL2 ? '/learn-l2' : '/learn');
        return;
      }
      return;
    }
  } catch(e) {}
};

// Update a nav "Learn" link to point to working level
LL.updateLearnLink = function(id) {
  try {
    var el = document.getElementById(id || 'nav-learn-link');
    if (el) el.href = LL.progress.learnPage(LL.progress.state());
  } catch(e) {}
};

LL.route('practice');
</script>
</head>
<body style="font-family:sans-serif;background:#0B1F3A;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
  <div style="text-align:center;">
    <div style="width:40px;height:40px;border:3px solid rgba(212,168,67,0.3);border-top-color:#D4A843;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;"></div>
    <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;">Loading your practice page...</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
