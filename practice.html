<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice — LedgerLearn Pro</title>
<link rel="icon" href="/favicon.svg">
<script>
// ╔══════════════════════════════════════════════════════════════╗
// ║  LedgerLearn — Central Routing Module v5.0                  ║
// ║  Single source of truth for ALL level/nav logic             ║
// ║                                                             ║
// ║  DESIGN RULES:                                              ║
// ║  1. "Learn" nav → current WORKING level (not highest)       ║
// ║  2. Auto-redirect only blocks LOCKED pages (can't access)   ║
// ║  3. Auto-redirect NEVER pushes user to a higher level       ║
// ║  4. User can always manually navigate to any unlocked level ║
// ║  5. Admin token in sessionStorage only — clears on tab close║
// ╚══════════════════════════════════════════════════════════════╝

var LL = LL || {};

LL.progress = (function() {

  function getRaw() {
    try { return JSON.parse(localStorage.getItem('ll_progress') || '{}'); } catch(e) { return {}; }
  }
  function getUser() {
    try { return JSON.parse(localStorage.getItem('ll_user') || '{}'); } catch(e) { return {}; }
  }

  // ── Core state ────────────────────────────────────────────
  function state() {
    var p         = getRaw();
    var completed = p.completedLevels || [];

    // Admin: valid only while sessionStorage token exists (clears on tab close)
    var adminToken = sessionStorage.getItem('ll_admin_token');
    var adminExp   = sessionStorage.getItem('ll_admin_expires');
    var isAdmin    = !!(adminToken && adminExp && new Date(adminExp) > new Date());

    // PASSED = level in completedLevels + real score recorded
    var passedL1 = completed.includes('l1') && (p.lastScore != null || p.l1Score != null);
    var passedL2 = completed.includes('l2') && (p.l2Score  != null);
    var passedL3 = completed.includes('l3') && (p.l3Score  != null);

    // PAID = real PayPal payment confirmed
    var paidL2 = p.paid_l2 === true;

    // ACCESS = can navigate to and use this level
    // L1: always
    // L2: must have passed L1 AND paid (or admin bypasses payment only)
    // L3: must have passed L2 (free after L2) — admin bypasses
    var accessL1 = true;
    var accessL2 = (passedL1 && paidL2) || (isAdmin);
    var accessL3 = passedL2              || (isAdmin);

    // WORKING LEVEL = the level the user is currently focused on
    // This is where Learn/Practice should take them
    // Logic: highest level they have STARTED (have access to) but not yet PASSED
    // If all passed → L3 (their most advanced)
    var workingLevel;
    if (!passedL1) {
      workingLevel = 'l1';                          // Doing L1
    } else if (!accessL2) {
      workingLevel = 'l1';                          // L1 done, L2 not unlocked yet
    } else if (!passedL2) {
      workingLevel = 'l2';                          // In L2
    } else if (!accessL3) {
      workingLevel = 'l2';                          // Should not happen (L3 free after L2)
    } else if (!passedL3) {
      workingLevel = 'l3';                          // In L3
    } else {
      workingLevel = 'l3';                          // All done, default to L3
    }

    // Admin override: if admin, use highest unlocked for navigation
    if (isAdmin) workingLevel = 'l3';

    return {
      p:            p,
      completed:    completed,
      isAdmin:      isAdmin,
      passedL1:     passedL1,
      passedL2:     passedL2,
      passedL3:     passedL3,
      paidL2:       paidL2,
      accessL1:     accessL1,
      accessL2:     accessL2,
      accessL3:     accessL3,
      workingLevel: workingLevel,
    };
  }

  // ── Convenience: URL for current working level ─────────
  function workingLearnPage(s) {
    if (s.workingLevel === 'l3') return '/learn-l3';
    if (s.workingLevel === 'l2') return '/learn-l2';
    return '/learn';
  }

  return { getRaw: getRaw, getUser: getUser, state: state, workingLearnPage: workingLearnPage };
})();


// ── Page routing ──────────────────────────────────────────
// Called once at page load. page = 'learn'|'learn-l2'|'learn-l3'|'practice'
LL.route = function(page) {
  try {
    var s = LL.progress.state();

    // ── PRACTICE: always go to working level ─────────────
    if (page === 'practice') {
      window.location.replace(LL.progress.workingLearnPage(s));
      return;
    }

    // ── LEARN (L1): block only if user doesn't belong here
    // Never auto-redirect UP — user explicitly navigated here
    if (page === 'learn') {
      // No blocking needed — L1 is always accessible
      // Nothing to do — stay on page
      return;
    }

    // ── LEARN-L2: block if no L2 access ──────────────────
    if (page === 'learn-l2') {
      if (!s.accessL2) {
        window.location.replace('/learn');
        return;
      }
      return;
    }

    // ── LEARN-L3: block if no L3 access ──────────────────
    if (page === 'learn-l3') {
      if (!s.accessL3) {
        if (s.accessL2) {
          window.location.replace('/learn-l2');
        } else {
          window.location.replace('/learn');
        }
        return;
      }
      return;
    }

  } catch(e) { /* silent — stay on page */ }
};


// ── Update nav "Learn" link to working level ──────────────
// Call after DOM is ready. Pass the nav link element ID.
LL.updateLearnLink = function(elementId) {
  try {
    var s = LL.progress.state();
    var el = document.getElementById(elementId || 'nav-learn-link');
    if (el) el.href = LL.progress.workingLearnPage(s);
  } catch(e) {}
};

LL.route('practice');
</script>
</head>
<body style="font-family:sans-serif;background:#0B1F3A;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
  <div style="text-align:center;">
    <div style="width:40px;height:40px;border:3px solid rgba(212,168,67,0.3);border-top-color:#D4A843;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;"></div>
    <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;">Loading your practice page...</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
