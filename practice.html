<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice — LedgerLearn Pro</title>
<link rel="icon" href="/favicon.svg">
<script>
// ╔══════════════════════════════════════════════════════════╗
// ║  LedgerLearn — Central Routing Module v4.0              ║
// ║  Single source of truth for ALL level/nav logic         ║
// ╚══════════════════════════════════════════════════════════╝

var LL = LL || {};

LL.progress = (function() {
  function get() {
    try { return JSON.parse(localStorage.getItem('ll_progress') || '{}'); } catch(e) { return {}; }
  }
  function user() {
    try { return JSON.parse(localStorage.getItem('ll_user') || '{}'); } catch(e) { return {}; }
  }

  // ── Core state — single definition used everywhere ──────
  function state() {
    var p         = get();
    var completed = p.completedLevels || [];
    var adminToken = sessionStorage.getItem('ll_admin_token');
    var adminExp   = sessionStorage.getItem('ll_admin_expires');
    var adminValid = adminToken && adminExp && new Date(adminExp) > new Date();
    var isAdmin    = (p.adminMode === true && adminValid);

    // A level is "passed" only when it appears in completedLevels WITH a real score
    // Admin mode does NOT count as passing — it only unlocks for testing
    var passedL1 = completed.includes('l1') && (p.lastScore != null || p.l1Score != null || isAdmin);
    var passedL2 = completed.includes('l2') && (p.l2Score != null || isAdmin);
    var passedL3 = completed.includes('l3') && (p.l3Score != null || isAdmin);

    // Access (can see/use the level)
    var paidL2    = p.paid_l2 === true;
    var accessL1  = true;                           // Always accessible
    var accessL2  = passedL1 && (paidL2 || isAdmin); // L1 done + paid OR admin
    var accessL3  = passedL2 || (isAdmin && accessL2); // L2 done OR admin with L2 access

    // Highest accessible level
    var currentLevel = accessL3 ? 'l3' : accessL2 ? 'l2' : 'l1';

    return {
      p: p, completed: completed, isAdmin: isAdmin,
      passedL1: passedL1, passedL2: passedL2, passedL3: passedL3,
      paidL2: paidL2,
      accessL1: accessL1, accessL2: accessL2, accessL3: accessL3,
      currentLevel: currentLevel,
    };
  }

  // ── Learn page for a given state ────────────────────────
  function learnPage(s) {
    if (s.accessL3) return '/learn-l3';
    if (s.accessL2) return '/learn-l2';
    return '/learn';
  }

  return { get: get, user: user, state: state, learnPage: learnPage };
})();

// ── Page-level routing ────────────────────────────────────
// Call once at page load. page = 'learn' | 'learn-l2' | 'learn-l3' | 'practice'
LL.route = function(page) {
  try {
    var s    = LL.progress.state();
    var from = document.referrer;
    var fromSelf = from.indexOf(window.location.hostname) > -1;

    if (page === 'practice') {
      // Always route practice to the correct learn page immediately
      if (s.accessL3)      { window.location.replace('/learn-l3'); }
      else if (s.accessL2) { window.location.replace('/learn-l2'); }
      else                  { window.location.replace('/learn');    }
      return;
    }

    if (page === 'learn') {
      // On /learn — only auto-redirect UP on direct (non-site) loads
      // Never redirect when user explicitly navigated here (back button, L1 banner)
      if (!fromSelf && s.accessL3) { window.location.replace('/learn-l3'); return; }
      if (!fromSelf && s.accessL2) { window.location.replace('/learn-l2'); return; }
    }

    if (page === 'learn-l2') {
      // Block if no L2 access — redirect down
      if (!s.accessL2 && !s.accessL1) { window.location.replace('/learn'); return; }
      if (!s.accessL2)                 { window.location.replace('/learn'); return; }
    }

    if (page === 'learn-l3') {
      // Block if no L3 access — redirect to highest accessible
      if (!s.accessL3 && s.accessL2) { window.location.replace('/learn-l2'); return; }
      if (!s.accessL3)               { window.location.replace('/learn');    return; }
    }

  } catch(e) { /* silent */ }
};

LL.route('practice');
</script>
</head>
<body style="font-family:sans-serif;background:#0B1F3A;color:#fff;display:flex;align-items:center;justify-content:center;min-height:100vh;margin:0;">
  <div style="text-align:center;">
    <div style="width:40px;height:40px;border:3px solid rgba(212,168,67,0.3);border-top-color:#D4A843;border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 1rem;"></div>
    <p style="color:rgba(255,255,255,0.5);font-size:0.9rem;">Loading your practice page...</p>
  </div>
  <style>@keyframes spin{to{transform:rotate(360deg)}}</style>
</body>
</html>
