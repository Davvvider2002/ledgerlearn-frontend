<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Practice — LedgerLearn Pro</title>
<link rel="icon" href="/favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@700;800&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<script>
// ── Immediate level routing (before render) ──────────
(function() {
  try {
    var p = JSON.parse(localStorage.getItem('ll_progress')||'{}');
    var completed = p.completedLevels || [];
    var isAdmin = p.adminMode === true || sessionStorage.getItem('ll_admin_token');
    var paidL2  = p.paid_l2 === true;
    var passedL1 = completed.includes('l1');
    var passedL2 = completed.includes('l2') || p.l2Score != null;
    // Route to the correct learn page which has practice embedded
    var cameFromSite = document.referrer.indexOf(window.location.hostname) > -1;
    if (!cameFromSite) {
      if (passedL2 || isAdmin) { window.location.replace('/learn-l3'); return; }
      if (passedL1 && (paidL2 || isAdmin)) { window.location.replace('/learn-l2'); return; }
      window.location.replace('/learn');
    }
  } catch(e) { window.location.replace('/learn'); }
})();
</script>
</head>
<body>
<p style="font-family:sans-serif;padding:2rem;color:#666;">Redirecting to your practice page...</p>
</body>
</html>
