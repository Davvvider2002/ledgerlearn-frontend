<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Your Certificate — LedgerLearn Pro</title>
<link rel="icon" href="/favicon.svg">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#0B1F3A;min-height:100vh;display:flex;flex-direction:column;}
nav{height:56px;background:rgba(11,31,58,0.98);border-bottom:2px solid #D4A843;display:flex;align-items:center;justify-content:space-between;padding:0 2rem;flex-shrink:0;}
.logo{display:flex;align-items:center;gap:8px;text-decoration:none;}
.hex{width:24px;height:24px;background:#D4A843;clip-path:polygon(50% 0%,100% 25%,100% 75%,50% 100%,0% 75%,0% 25%);}
.brand{font-weight:800;font-size:1rem;color:#fff;letter-spacing:-0.01em;}
.brand span{color:#D4A843;}
.nav-back{color:rgba(255,255,255,0.5);text-decoration:none;font-size:0.85rem;}
.nav-back:hover{color:#fff;}
main{flex:1;display:flex;align-items:center;justify-content:center;padding:2rem;
  background:radial-gradient(ellipse at 30% 50%,rgba(29,169,138,0.08) 0%,transparent 60%),
  radial-gradient(ellipse at 70% 30%,rgba(212,168,67,0.06) 0%,transparent 50%);}
.card{background:rgba(255,255,255,0.04);border:1px solid rgba(255,255,255,0.1);border-radius:18px;padding:2.5rem 2rem;max-width:500px;width:100%;text-align:center;}
.icon{font-size:4rem;display:block;margin-bottom:1rem;}
.badge{display:inline-flex;align-items:center;gap:6px;background:rgba(29,169,138,0.15);border:1px solid rgba(29,169,138,0.35);color:#26c9a5;font-size:0.72rem;font-weight:700;text-transform:uppercase;letter-spacing:0.08em;padding:4px 14px;border-radius:100px;margin-bottom:1.25rem;}
h1{font-size:1.8rem;font-weight:800;color:#fff;letter-spacing:-0.02em;margin-bottom:0.5rem;}
.score{font-size:4rem;font-weight:800;color:#D4A843;line-height:1;margin:0.5rem 0 0.25rem;}
.score-sub{font-size:0.8rem;color:rgba(255,255,255,0.4);margin-bottom:0.75rem;}
.cert-name{font-size:1.1rem;color:rgba(255,255,255,0.85);font-weight:600;margin-bottom:0.25rem;}
.cert-id{font-size:0.72rem;color:rgba(255,255,255,0.3);font-family:monospace;margin-bottom:2rem;}
.actions{display:flex;flex-direction:column;gap:0.75rem;}
.btn{width:100%;padding:15px;border-radius:10px;font-size:1rem;font-weight:700;cursor:pointer;border:none;display:flex;align-items:center;justify-content:center;gap:10px;transition:all 0.2s;font-family:inherit;}
.btn-gold{background:#D4A843;color:#0B1F3A;}
.btn-gold:hover{background:#f0c860;transform:translateY(-2px);box-shadow:0 8px 24px rgba(212,168,67,0.4);}
.btn-teal{background:#1DA98A;color:#fff;}
.btn-teal:hover{background:#26c9a5;transform:translateY(-2px);}
.btn-li{background:#0077B5;color:#fff;}
.btn-li:hover{background:#006097;transform:translateY(-2px);}
.status{font-size:0.82rem;color:rgba(255,255,255,0.4);min-height:1.4em;margin-bottom:1rem;line-height:1.5;}
.status.ok{color:#26c9a5;font-weight:600;}
.status.err{color:#ff8080;}
.no-cert{background:rgba(224,85,85,0.08);border:1px solid rgba(224,85,85,0.2);border-radius:10px;padding:1.25rem;margin-top:1rem;}
.no-cert h3{font-size:0.875rem;font-weight:700;color:#ff8080;margin-bottom:0.5rem;}

.no-cert a{color:#D4A843;}
canvas{display:none;}
</style>

<body>

<nav>
  <a href="/" class="logo"><div class="hex"></div><span class="brand">Ledger<span>Learn</span> Pro</span></a>
  <a href="/test" class="nav-back">← Back to assessment</a>
</nav>

<main>
  <div class="card" id="main-card">
    <span class="icon">🏆</span>
    <div class="badge" id="cert-badge">Loading…</div>
    <h1 id="cert-heading">Your Certificate</h1>
    <div class="score" id="cert-score">—</div>
    <div class="score-sub" id="cert-score-sub"></div>
    <div class="cert-name" id="cert-name"></div>
    <div class="cert-id" id="cert-id"></div>
    <div class="status" id="status"></div>
    <div class="actions" id="actions"></div>
    <canvas id="canvas"></canvas>
  </div>
</main>

<script>
var CERT = null;

// ── Load cert from VERIFIED sources only ──────────────────
// NO manual entry. NO URL params. ONLY confirmed assessment data.
function loadCert() {
  // Source 1: in-memory from this session's finishTest()
  if (window._lastCertData && window._lastCertData.score && window._lastCertData.candidateName) {
    return window._lastCertData;
  }

  // Source 2: ll_progress.certificate (saved by finishTest)
  try {
    var d = JSON.parse(localStorage.getItem('ll_progress') || '{}');
    if (d.certificate && d.certificate.score && d.certificate.candidateName &&
        d.certificate.candidateName !== 'Candidate') {
      return d.certificate;
    }
    // lastScore exists but no certificate object yet - reconstruct WITH verified name
    if (d.lastScore && d.lastScore >= 70) {
      var u = JSON.parse(localStorage.getItem('ll_user') || '{}');
      if (u.name && u.name.trim().length > 1) {
        return {
          candidateName: u.name.trim(),
          certTitle: 'Xero Certified Practitioner \u2014 Level 1',
          certLevel: 'L1 \u00B7 Associate \u00B7 Xero Cloud Accounting \u00B7 LedgerLearn Pro',
          certId: d.certId || ('LLP-XCP1-' + new Date().getFullYear() + '-' + Math.floor(1000+Math.random()*9000)),
          issueDate: d.issueDate || new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),
          score: d.lastScore
        };
      }
    }
  } catch(e) {}

  return null;
}

function setStatus(msg, type) {
  var el = document.getElementById('status');
  el.textContent = msg;
  el.className = 'status' + (type ? ' ' + type : '');
}

function showNoCert() {
  document.getElementById('cert-badge').textContent = 'No certificate found';
  document.getElementById('cert-badge').style.background = 'rgba(224,85,85,0.15)';
  document.getElementById('cert-badge').style.borderColor = 'rgba(224,85,85,0.3)';
  document.getElementById('cert-badge').style.color = '#ff8080';
  document.getElementById('cert-heading').textContent = 'Certificate not available';
  document.getElementById('cert-score').textContent = '';
  document.getElementById('cert-score-sub').textContent = '';
  document.getElementById('cert-name').textContent = '';
  document.getElementById('cert-id').textContent = '';
  document.getElementById('status').textContent = '';
  document.getElementById('actions').innerHTML =
    '<div class="no-cert">' +
    '<h3>\u26A0\uFE0F No verified certificate data found</h3>' +
    '<p>This happens when you visit this page from a different browser or device after a domain change.<br><br>' +
    'To get your certificate: <a href="/test">go back to the assessment page</a> and click Download Certificate from the results screen directly.</p>' +
    '</div>';
}

// ── Canvas drawing ────────────────────────────────────────
function drawHex(ctx,cx,cy,r){
  ctx.beginPath();
  for(var i=0;i<6;i++){var a=Math.PI/180*(90+60*i);if(i===0)ctx.moveTo(cx+r*Math.cos(a),cy+r*Math.sin(a));else ctx.lineTo(cx+r*Math.cos(a),cy+r*Math.sin(a));}
  ctx.closePath();ctx.fill();
}

function rr(ctx,x,y,w,h,r){
  ctx.beginPath();ctx.moveTo(x+r,y);ctx.lineTo(x+w-r,y);ctx.quadraticCurveTo(x+w,y,x+w,y+r);
  ctx.lineTo(x+w,y+h-r);ctx.quadraticCurveTo(x+w,y+h,x+w-r,y+h);
  ctx.lineTo(x+r,y+h);ctx.quadraticCurveTo(x,y+h,x,y+h-r);
  ctx.lineTo(x,y+r);ctx.quadraticCurveTo(x,y,x+r,y);ctx.closePath();
}

function drawCert(cert) {
  var W=1748,H=1240,cx=W/2;
  var canvas=document.getElementById('canvas');
  canvas.width=W;canvas.height=H;
  var ctx=canvas.getContext('2d');

  ctx.fillStyle='#f8f7f4';ctx.fillRect(0,0,W,H);
  ctx.fillStyle='#ffffff';ctx.fillRect(24,24,W-48,H-48);

  var tg=ctx.createLinearGradient(0,0,W,0);
  tg.addColorStop(0,'#0B1F3A');tg.addColorStop(0.45,'#D4A843');tg.addColorStop(1,'#1DA98A');
  ctx.fillStyle=tg;ctx.fillRect(0,0,W,22);

  var bg=ctx.createLinearGradient(0,0,W,0);
  bg.addColorStop(0,'#1DA98A');bg.addColorStop(0.6,'#D4A843');bg.addColorStop(1,'#0B1F3A');
  ctx.fillStyle=bg;ctx.fillRect(0,H-14,W,14);

  ctx.fillStyle='#D4A843';ctx.fillRect(24,24,4,H-48);
  ctx.fillStyle='#1DA98A';ctx.fillRect(32,24,2,H-48);

  ctx.save();ctx.globalAlpha=0.025;ctx.fillStyle='#0B1F3A';drawHex(ctx,W*0.82,H*0.48,280);ctx.restore();

  ctx.fillStyle='#D4A843';drawHex(ctx,72,H-58,20);
  ctx.textAlign='left';ctx.font='bold 28px system-ui,sans-serif';
  ctx.fillStyle='#0B1F3A';var llw=ctx.measureText('LedgerLearn').width;
  ctx.fillText('LedgerLearn',102,H-44);ctx.fillStyle='#D4A843';ctx.fillText(' Pro',102+llw,H-44);

  var idt='Certificate ID: '+(cert.certId||'\u2014');
  ctx.font='20px system-ui,sans-serif';var idw=ctx.measureText(idt).width+30;
  ctx.fillStyle='#e8ecf0';rr(ctx,W-idw-50,H-80,idw,36,6);ctx.fill();
  ctx.fillStyle='#6b87a3';ctx.fillText(idt,W-idw-35,H-57);

  ctx.textAlign='center';ctx.font='bold 22px system-ui,sans-serif';
  ctx.fillStyle='#6b87a3';ctx.fillText('THIS CERTIFIES THAT',cx,220);

  ctx.font='bold italic 90px Georgia,serif';ctx.fillStyle='#0B1F3A';
  ctx.fillText(cert.candidateName,cx,340);

  var nw=ctx.measureText(cert.candidateName).width*0.55;
  var lg=ctx.createLinearGradient(cx-nw/2,0,cx+nw/2,0);
  lg.addColorStop(0,'#D4A843');lg.addColorStop(1,'#1DA98A');
  ctx.strokeStyle=lg;ctx.lineWidth=5;ctx.beginPath();ctx.moveTo(cx-nw/2,358);ctx.lineTo(cx+nw/2,358);ctx.stroke();

  ctx.font='26px system-ui,sans-serif';ctx.fillStyle='#6b87a3';
  ctx.fillText('has successfully completed all requirements for',cx,410);

  ctx.font='bold 48px system-ui,sans-serif';ctx.fillStyle='#0B1F3A';
  ctx.fillText(cert.certTitle||'Xero Certified Practitioner \u2014 Level 1',cx,490);

  if(cert.score){
    var sc='Score: '+cert.score+'%';ctx.font='bold 22px system-ui,sans-serif';
    var sw=ctx.measureText(sc).width+30;
    ctx.fillStyle='#e1f7f2';rr(ctx,cx-sw/2,508,sw,38,19);ctx.fill();
    ctx.strokeStyle='rgba(29,169,138,0.4)';ctx.lineWidth=1;rr(ctx,cx-sw/2,508,sw,38,19);ctx.stroke();
    ctx.fillStyle='#1DA98A';ctx.fillText(sc,cx,533);
  }

  var lvl=cert.certLevel||'Associate \u00B7 Xero Cloud Accounting \u00B7 LedgerLearn Pro';
  ctx.font='bold 20px system-ui,sans-serif';var lw=ctx.measureText(lvl).width+40;
  ctx.fillStyle='#e1f7f2';rr(ctx,cx-lw/2,560,lw,36,18);ctx.fill();
  ctx.strokeStyle='rgba(29,169,138,0.3)';ctx.lineWidth=1;rr(ctx,cx-lw/2,560,lw,36,18);ctx.stroke();
  ctx.fillStyle='#1DA98A';ctx.fillText(lvl,cx,584);

  ctx.strokeStyle='#e8ecf0';ctx.lineWidth=2;ctx.beginPath();ctx.moveTo(60,680);ctx.lineTo(W-60,680);ctx.stroke();

  ctx.font='bold italic 28px Georgia,serif';ctx.fillStyle='#0B1F3A';ctx.fillText('David Ayomidotun',200,730);
  ctx.font='18px system-ui,sans-serif';ctx.fillStyle='#6b87a3';
  ctx.fillText('Platform Director',200,756);ctx.fillText('LedgerLearn Pro',200,778);
  ctx.strokeStyle='#e8ecf0';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(80,680);ctx.lineTo(340,680);ctx.stroke();

  ctx.font='bold 26px system-ui,sans-serif';ctx.fillStyle='#0B1F3A';
  ctx.fillText(cert.issueDate||new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'}),W-200,730);
  ctx.font='18px system-ui,sans-serif';ctx.fillStyle='#6b87a3';ctx.fillText('Date of Issue',W-200,756);
  ctx.strokeStyle='#e8ecf0';ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W-340,680);ctx.lineTo(W-80,680);ctx.stroke();

  var sx=cx,sy=718,sr=56;
  ctx.strokeStyle='#D4A843';ctx.lineWidth=3;ctx.beginPath();ctx.arc(sx,sy,sr,0,Math.PI*2);ctx.stroke();
  ctx.setLineDash([4,6]);ctx.lineWidth=1.5;ctx.beginPath();ctx.arc(sx,sy,sr-10,0,Math.PI*2);ctx.stroke();ctx.setLineDash([]);
  ctx.fillStyle='#ffffff';ctx.beginPath();ctx.arc(sx,sy,sr-12,0,Math.PI*2);ctx.fill();
  ctx.font='bold 14px system-ui,sans-serif';ctx.fillStyle='#a07c2a';
  ctx.fillText('LEDGERLEARN',sx,sy+4);ctx.fillText('VERIFIED',sx,sy+22);
  ctx.fillStyle='#D4A843';drawHex(ctx,sx,sy-14,9);

  ctx.font='18px system-ui,sans-serif';ctx.fillStyle='#6b87a3';
  ctx.fillText('Verify: '+window.location.hostname+'/verify  \u00B7  ID: '+(cert.certId||''),cx,H-32);

  return canvas;
}

// ── Download PNG ──────────────────────────────────────────
function downloadPNG() {
  setStatus('Drawing your certificate…','');
  setTimeout(function(){
    try {
      var canvas = drawCert(CERT);
      var fname  = 'LedgerLearn_Certificate_'+CERT.candidateName.replace(/\s+/g,'_')+'_'+CERT.certId+'.png';
      canvas.toBlob(function(blob){
        if(!blob){ openPrint(); return; }
        var url=URL.createObjectURL(blob);
        var a=document.createElement('a');
        a.href=url;a.download=fname;a.style.display='none';
        document.body.appendChild(a);a.click();
        setTimeout(function(){URL.revokeObjectURL(url);a.remove();},1000);
        setStatus('\u2713 Certificate downloaded as PNG!','ok');
      },'image/png');
    } catch(e){
      console.error('[Cert]',e);
      openPrint();
    }
  },100);
}

// ── Print fallback ────────────────────────────────────────
function openPrint(){
  var dom=window.location.hostname;
  var isd=CERT.issueDate||new Date().toLocaleDateString('en-GB',{day:'numeric',month:'long',year:'numeric'});
  var h='<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Certificate</title>'+
    '<style>*{margin:0;padding:0;box-sizing:border-box;}body{font-family:Georgia,serif;background:#eee;padding:2rem;display:flex;flex-direction:column;align-items:center;gap:1rem;}'+
    '.c{background:#fff;width:100%;max-width:900px;aspect-ratio:1.414/1;box-shadow:0 10px 40px rgba(0,0,0,.2);display:flex;flex-direction:column;}'+
    '.t{height:8px;background:linear-gradient(90deg,#0B1F3A,#D4A843 45%,#1DA98A);}.b{flex:1;padding:2.5rem 3rem;display:flex;flex-direction:column;align-items:center;text-align:center;}'+
    '.lo{font-family:Arial,sans-serif;font-size:1rem;font-weight:700;color:#0B1F3A;margin-bottom:1.5rem;}.lo span{color:#D4A843;}'+
    'h3{font-family:Arial,sans-serif;font-size:.65rem;text-transform:uppercase;letter-spacing:.14em;color:#6b87a3;margin-bottom:.4rem;}'+
    'h1{font-size:clamp(1.8rem,5vw,3rem);font-style:italic;color:#0B1F3A;margin-bottom:.4rem;}'+
    '.ln{width:50px;height:2px;background:linear-gradient(90deg,#D4A843,#1DA98A);margin:.4rem auto;}'+
    'h2{font-family:Arial,sans-serif;font-size:clamp(.9rem,2vw,1.2rem);color:#0B1F3A;margin-bottom:.4rem;}'+
    '.pl{background:#e1f7f2;border:1px solid rgba(29,169,138,.3);color:#1DA98A;font-family:Arial,sans-serif;font-size:.62rem;font-weight:700;text-transform:uppercase;padding:2px 10px;border-radius:100px;display:inline-block;margin-bottom:.3rem;}'+
    '.sc{background:#fdf3dc;color:#9a7320;font-family:Arial,sans-serif;font-size:.62rem;font-weight:700;padding:2px 10px;border-radius:100px;display:inline-block;margin-bottom:.75rem;}'+
    '.ft{display:flex;justify-content:space-between;align-items:flex-end;width:100%;margin-top:auto;padding-top:.75rem;border-top:1px solid #e8ecf0;}'+
    '.sg{text-align:center;font-family:Arial,sans-serif;}.sn{font-style:italic;font-family:Georgia,serif;font-size:.9rem;color:#0B1F3A;}.sr{font-size:.52rem;text-transform:uppercase;letter-spacing:.08em;color:#6b87a3;}'+
    '.sl{width:55px;height:55px;border-radius:50%;border:2px solid #D4A843;display:flex;align-items:center;justify-content:center;}'+
    '.sl span{font-family:Arial,sans-serif;font-size:.36rem;font-weight:700;text-transform:uppercase;text-align:center;color:#a07c2a;line-height:1.5;}'+
    '.ve{font-family:Arial,sans-serif;font-size:.52rem;color:#6b87a3;margin-top:.4rem;}'+
    '.bb{height:4px;background:linear-gradient(90deg,#1DA98A,#D4A843 60%,#0B1F3A);}'+
    '.ac{display:flex;gap:.75rem;}.btn{padding:11px 22px;border:none;border-radius:7px;font-size:.95rem;font-weight:700;cursor:pointer;}.d{background:#1DA98A;color:#fff;}.x{background:#f0f2f5;}'+
    '@media print{body{background:#fff;padding:0;}.ac{display:none!important;}.c{box-shadow:none;max-width:100%;}}</style></head><body>'+
    '<div class="c"><div class="t"></div><div class="b">'+
    '<div class="lo">Ledger<span>Learn</span> Pro</div>'+
    '<h3>This certifies that</h3><h1>'+CERT.candidateName+'</h1><div class="ln"></div>'+
    '<p style="font-family:Arial,sans-serif;font-size:.78rem;color:#6b87a3;margin-bottom:.4rem">has successfully completed all requirements for</p>'+
    '<h2>'+CERT.certTitle+'</h2>'+
    '<div class="pl">'+CERT.certLevel+'</div><br>'+
    '<div class="sc">Score: '+CERT.score+'% \u2014 Passed \u2713</div>'+
    '<div class="ft">'+
    '<div class="sg"><div class="sn">David Ayomidotun</div><div class="sr">Platform Director \u00B7 LedgerLearn Pro</div></div>'+
    '<div class="sl"><span>LEDGER<br>LEARN<br>VERIFIED</span></div>'+
    '<div class="sg"><div class="sn" style="font-style:normal;font-size:.82rem">'+isd+'</div><div class="sr">Date of Issue</div></div>'+
    '</div><div class="ve">Certificate ID: '+CERT.certId+' \u00B7 Verify: '+dom+'/verify</div>'+
    '</div><div class="bb"></div></div>'+
    '<div class="ac"><button class="btn d" onclick="window.print()">\uD83D\uDDA8\uFE0F Save as PDF</button><button class="btn x" onclick="window.close()">Close</button></div>'+
    '</body></html>';
  var blob=new Blob([h],{type:'text/html'});
  var url=URL.createObjectURL(blob);
  var win=window.open(url,'_blank');
  if(!win){var a=document.createElement('a');a.href=url;a.download='LedgerLearn_Certificate_'+CERT.candidateName.replace(/\s+/g,'_')+'.html';a.click();}
  setStatus('Print version opened \u2014 use Print \u2192 Save as PDF','ok');
}

// ── LinkedIn ──────────────────────────────────────────────
function shareLinkedIn(){
  var dom=window.location.hostname;
  var vurl='https://'+dom+'/verify';
  var txt='\uD83C\uDFC6 Just earned my '+CERT.certTitle+' from LedgerLearn Pro!\n\n'+
    '\u2705 Score: '+CERT.score+'%\n'+
    '\uD83D\uDD0D Certificate ID: '+CERT.certId+'\n'+
    '\uD83D\uDD17 Verify: '+vurl+'\n\n'+
    '#Xero #Accounting #Bookkeeping #CertifiedPractitioner #LedgerLearn';
  var liUrl='https://www.linkedin.com/sharing/share-offsite/?url='+encodeURIComponent(vurl)+'&summary='+encodeURIComponent(txt);
  var popup=window.open(liUrl,'li','width=600,height=620,scrollbars=yes');
  if(!popup||popup.closed){var a=document.createElement('a');a.href=liUrl;a.target='_blank';a.rel='noopener noreferrer';document.body.appendChild(a);a.click();a.remove();}
  if(navigator.clipboard&&navigator.clipboard.writeText){
    navigator.clipboard.writeText(txt).then(function(){setStatus('LinkedIn opened + post text copied \u2713','ok');}).catch(function(){setStatus('LinkedIn opened \u2713','ok');});
  } else { setStatus('LinkedIn opened \u2713','ok'); }
}

// ── Init ──────────────────────────────────────────────────
(function(){
  CERT = loadCert();
  if (!CERT) { showNoCert(); return; }

  document.getElementById('cert-badge').textContent = '\u2713 Assessment Passed';
  document.getElementById('cert-heading').textContent = 'Congratulations!';
  document.getElementById('cert-score').textContent   = CERT.score + '%';
  document.getElementById('cert-score-sub').textContent = 'Pass mark: 70% \u00B7 You scored: ' + CERT.score + '%';
  document.getElementById('cert-name').textContent    = CERT.candidateName;
  document.getElementById('cert-id').textContent      = 'Certificate ID: ' + CERT.certId;
  setStatus('Certificate data verified \u2713 Ready to download', 'ok');

  document.getElementById('actions').innerHTML =
    '<button class="btn btn-gold" onclick="downloadPNG()">\uD83D\uDCC4 Download Certificate (PNG)</button>' +
